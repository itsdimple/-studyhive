<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudyHive Library 📚</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">

  <nav>
    <a class="logo" href="/">🐝 StudyHive</a>
    <div class="nav-links">
  <a href="/">Home</a>
  <a href="/todo">📝 To-Do</a>
  <a href="/library" class="active">📚 Library</a>
  <a href="/collection">📁 Collection</a>
</div>
  </nav>

  <div class="hero">
    <h1>📚 <span class="highlight">Community Library</span></h1>
    <p class="subtitle">Study from notes shared by other students!</p>
  </div>

  <div class="main-card">
    <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:center">
      <input id="search-subject" placeholder="Filter by subject e.g. Physics"
        style="padding:10px 16px; border-radius:50px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.07); color:white; font-size:14px; width:260px; outline:none;">
      <button onclick="filterNotes()" style="background:linear-gradient(135deg,#ff6eb4,#a855f7); color:white; border:none; padding:10px 20px; border-radius:50px; font-size:14px; font-weight:600; cursor:pointer;">Search 🔍</button>
      <button onclick="loadNotes()" style="background:rgba(255,255,255,0.08); color:white; border:1px solid rgba(255,255,255,0.2); padding:10px 20px; border-radius:50px; font-size:14px; font-weight:600; cursor:pointer;">Show All</button>
    </div>
  </div>

  <div id="library-container" style="margin-top:20px"></div>

</div>

<script>
let upvoted = {};

async function loadNotes(subject = '') {
  const url = subject ? `/get-notes?subject=${subject}` : '/get-notes';
  
  try {
    const response = await fetch(url);
    const notes = await response.json();
    const container = document.getElementById('library-container');

    if (notes.length === 0) {
      container.innerHTML = '<p style="color:white; text-align:center; margin-top:20px">No notes shared yet! Be the first to share 🐝</p>';
      return;
    }

    container.innerHTML = '';
    notes.forEach((note, i) => {
      const div = document.createElement('div');
      div.className = 'library-card';
      div.innerHTML = `
        <div class="library-card-header">
          <h3>${note.title}</h3>
          <span class="subject-tag">${note.subject}</span>
        </div>
        <p>By ${note.author} · ${note.cards.length} flashcards · 👁 ${note.views} views · ⭐ ${note.upvotes}</p>
        <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap">
        <button onclick="studyNote(${i})" style="background:#a855f7; color:white; padding:8px 16px; border-radius:10px; border:none; cursor:pointer">Study Now 📖</button>
        ${note.pdf_filename ? `<a href="/download-pdf/${note.pdf_filename}" style="background:linear-gradient(135deg,#ff6eb4,#a855f7); color:white; padding:8px 16px; border-radius:10px; text-decoration:none; font-size:14px;">⬇️ PDF</a>` : ''}
        <button id="upvote-btn-${i}" onclick="upvoteNote(${i})" style="background:linear-gradient(135deg,#ff6eb4,#a855f7); color:white; padding:8px 16px; border-radius:10px; border:none; cursor:pointer">⭐ Upvote</button>
        <button onclick="deleteNote(${i})" style="background:#ff6b6b; color:white; padding:8px 16px; border-radius:10px; border:none; cursor:pointer">🗑️ Delete</button>
        </div>
        <div id="study-${i}" style="display:none; margin-top:16px">
          <div id="cards-container"></div>
        </div>`;
      container.appendChild(div);
    });
  } catch(err) {
    console.error('Error loading notes:', err);
    document.getElementById('library-container').innerHTML = '<p style="color:red; text-align:center;">Error loading notes. Please refresh!</p>';
  }
}

async function studyNote(i) {
  const studyDiv = document.getElementById(`study-${i}`);
  if (studyDiv.style.display === 'block') {
    studyDiv.style.display = 'none';
    return;
  }

  const response = await fetch(`/view/${i}`);
  const note = await response.json();
  const container = studyDiv.querySelector('#cards-container');
  container.innerHTML = '';
  studyDiv.style.display = 'block';

  note.cards.forEach(card => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="card-inner" onclick="this.classList.toggle('flipped')">
        <div class="card-front">❓ ${card.question}</div>
        <div class="card-back">✅ ${card.answer}</div>
      </div>`;
    container.appendChild(div);
  });
}

async function deleteNote(i) {
  if (!confirm('Are you sure you want to delete this note?')) return;
  await fetch('/delete-note', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ index: i })
  });
  alert('Note deleted! 🗑️');
  loadNotes();
}

async function upvoteNote(i) {
  if (upvoted[i]) {
    await fetch('/unupvote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ index: i })
    });
    upvoted[i] = false;
    document.getElementById(`upvote-btn-${i}`).innerText = '⭐ Upvote';
  } else {
    await fetch('/upvote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ index: i })
    });
    upvoted[i] = true;
    document.getElementById(`upvote-btn-${i}`).innerText = '★ Upvoted!';
  }
  loadNotes();
}

function filterNotes() {
  const subject = document.getElementById('search-subject').value;
  loadNotes(subject);
}

loadNotes();
</script>
</body>
</html>
